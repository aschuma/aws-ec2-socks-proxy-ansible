- name: Validate AWS identity and credentials
  amazon.aws.aws_caller_info:
    region: "{{ awssocks_region_resolved }}"
  register: awssocks_aws_identity

- name: Log AWS identity context
  ansible.builtin.debug:
    msg:
      - "AWS identity validated in region={{ awssocks_region_resolved }}"
      - "account={{ awssocks_aws_identity.account }}"
      - "arn={{ awssocks_aws_identity.arn }}"

